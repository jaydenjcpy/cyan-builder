name: Inject IPA
on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: 'Direct link to the IPA file'
        required: true
      tweak_url:
        description: 'Direct link to the tweak file (.cyan or .dylib)'
        required: true
      tweak_type:
        description: 'Type of tweak file'
        required: true
        default: 'cyan'
        type: choice
        options:
          - dylib
          - cyan

permissions:
  contents: write

jobs:
  inject:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip python3-venv curl unzip zstd binutils
      - name: Install pipx
        run: |
          python3 -m pip install --user pipx
          python3 -m pipx ensurepath
        env:
          PIPX_HOME: ~/.local/pipx
          PIPX_BIN_DIR: ~/.local/bin
      - name: Add pipx to PATH
        run: echo "${HOME}/.local/bin" >> $GITHUB_PATH
      - name: Install cyan
        run: pipx install --force https://github.com/asdfzxcvbn/pyzule-rw/archive/main.zip
      - name: Download IPA
        run: curl -L "${{ github.event.inputs.ipa_url }}" -o app.ipa
      - name: Download tweak (dylib)
        if: ${{ github.event.inputs.tweak_type == 'dylib' }}
        run: curl -L "${{ github.event.inputs.tweak_url }}" -o tweak.dylib
      - name: Download tweak (cyan)
        if: ${{ github.event.inputs.tweak_type == 'cyan' }}
        run: |
          curl -L "${{ github.event.inputs.tweak_url }}" -o tweak.cyan
          unzip -l tweak.cyan || (echo "[!] tweak.cyan appears corrupt or invalid" && exit 1)
      - name: Inject dylib into IPA
        if: ${{ github.event.inputs.tweak_type == 'dylib' }}
        run: cyan -i app.ipa -f tweak.dylib -o output.ipa
      - name: Inject cyan into IPA
        if: ${{ github.event.inputs.tweak_type == 'cyan' }}
        run: cyan -i app.ipa -z tweak.cyan -o output.ipa
      - name: Create draft release with injected IPA
        uses: ncipollo/release-action@v1
        with:
          tag: injected-ipa-${{ github.run_number }}
          name: Injected IPA ${{ github.run_number }}
          draft: true
          prerelease: false
          artifacts: output.ipa
          token: ${{ secrets.GITHUB_TOKEN }}
